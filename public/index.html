<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webtr</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="home">
      <h1>webtr</h1>
      <p>Open any URL through the proxy and use the in-page translation sidebar.</p>
      <form id="urlForm" class="url-form">
        <input
          id="urlInput"
          type="url"
          placeholder="Paste a URL to browse (e.g. https://yle.fi)"
          required
        />
        <button type="submit">Open</button>
      </form>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
