<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webtr</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <form id="urlForm" class="url-form">
        <input
          id="urlInput"
          type="url"
          placeholder="Paste a URL to browse (e.g. https://elpais.com)"
          required
        />
        <button type="submit">Open</button>
      </form>
      <label class="lang-select">
        Target language
        <select id="targetLang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh-CN">Chinese (Simplified)</option>
        </select>
      </label>
    </header>

    <main class="layout">
      <section class="viewer">
        <iframe id="readerFrame" title="foreign webpage viewer"></iframe>
      </section>
      <aside class="panel" id="panel">
        <h2>Hover Translation</h2>
        <p class="hint">Hover any word in the page to see context-aware translations.</p>

        <div class="group">
          <h3>Word</h3>
          <p id="wordText">—</p>
        </div>

        <div class="group">
          <h3>Root / lemma</h3>
          <p id="rootText">—</p>
        </div>

        <div class="group">
          <h3>Ranked translations</h3>
          <ol id="translations"></ol>
        </div>

        <div class="group">
          <h3>Sentence</h3>
          <p id="sentenceText">—</p>
        </div>

        <div class="group">
          <h3>Sentence translation</h3>
          <p id="sentenceTranslationText">—</p>
        </div>

        <div class="group">
          <h3>Providers used</h3>
          <p id="providers">—</p>
        </div>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
